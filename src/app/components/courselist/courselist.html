<div class="max-w-7xl mx-auto px-4 pt-16 pb-12 text-center">
  <span class="inline-block px-4 py-1.5 mb-4 text-xs font-bold tracking-widest uppercase bg-[#6F4E37]/10 text-[#6F4E37] rounded-full">
    Step Into Your Future
  </span>
  <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-4">
    Architecture Your <span class="text-transparent bg-clip-text bg-linear-to-r from-[#6F4E37] to-[#A67B5B]">Success.</span>
  </h1>
  <p class="text-lg text-slate-500 max-w-2xl mx-auto">
    Go beyond basic syntax. Our expert-led curriculum is designed to turn developers into tech architects.
  </p>
</div>

<div class="max-w-6xl mx-auto px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (c of courses; track c.id) {
        <div
            class="max-w-xs mx-auto flex flex-col bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden h-full">
            <div class="flex justify-center pt-8 pb-6">
                <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-[#FDF8F5] shadow-sm shrink-0 bg-white">
                    <img [src]="c.image" [alt]="c.name" class="w-full h-full object-cover" />
                </div>
            </div>
            <div class="px-6 pb-8 text-center space-y-2">
                <h3 class="text-xl font-semibold text-slate-800 tracking-tight">
                    {{ c.name }}
                </h3>
                <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed">
                    {{ c.description }}
                </p>
            </div>
            <a
                class="group block bg-slate-50 px-6 py-4 mt-2 border-t border-slate-100 hover:bg-[#FDF8F5] transition-colors">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-semibold text-[#6F4E37] group-hover:text-[#4B3621]">
                        Learn More
                    </span>

                    <div (click)="goToDetails(c.id)"
                        class="w-8 h-8 flex items-center justify-center rounded-full bg-[#6F4E37]/10 text-[#6F4E37] group-hover:bg-[#6F4E37] group-hover:text-white transition-all">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </div>
            </a>
        </div>
        } @empty {
        <p class="text-center col-span-full py-10 text-slate-500">No courses available at the moment.</p>
        }
    </div>
</div>
