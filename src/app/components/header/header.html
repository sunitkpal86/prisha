<header class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/80 backdrop-blur-md">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <div class="flex shrink-0 items-center">
        <a routerLink="/" class="text-2xl font-black tracking-tighter text-blue-600">
          Prisha<span class="text-gray-900">Academy</span>
        </a>
      </div>
      <nav class="hidden md:flex items-center space-x-1">
        <a routerLink="/" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Home</a>
        <a routerLink="/about" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">About Us</a>
        <a routerLink="/course" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Courses</a>
        <a routerLink="/blog" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Blogs</a>
        <a routerLink="/contact" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Contact</a>
      </nav>
      <div class="flex md:hidden">
        <button (click)="toggleMenu()" 
                type="button" 
                class="inline-flex items-center justify-center rounded-md p-2 text-gray-500 hover:bg-gray-100 focus:outline-none"
                [aria-expanded]="isMenuOpen()">
          <span class="sr-only">Toggle Menu</span>
          <svg class="h-6 w-6 transition-transform duration-200" 
               [class.rotate-90]="isMenuOpen()"
               fill="none" viewBox="0 0 24 24" stroke="currentColor">
            @if (!isMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            }
          </svg>
        </button>
      </div>
    </div>
  </div>

  @if (isMenuOpen()) {
    <div class="md:hidden border-t border-gray-100 bg-white px-4 py-6 space-y-4 animate-in slide-in-from-top duration-200">
      <a routerLink="/" (click)="closeMenu()" class="block px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Home</a>
      <a routerLink="/about" (click)="closeMenu()" class="block px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">About Us</a>
      <a routerLink="/course" (click)="closeMenu()" class="block px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Courses</a>
      <a routerLink="/blog" (click)="closeMenu()" class="block px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Blogs</a>
      <a routerLink="/contact" (click)="closeMenu()" class="block px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Contact</a>
    </div>
  }
</header>
